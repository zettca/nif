name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  CI: true

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - run: pnpm i

      - run: pnpm check

      #- run: pnpm test

      - name: Build
        run: pnpm build --base=/nif/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/
          retention-days: 1

  Publish:
    runs-on: ubuntu-latest
    needs: [Build]

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
